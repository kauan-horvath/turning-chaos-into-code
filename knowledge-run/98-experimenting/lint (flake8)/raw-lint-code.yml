# .github/workflows/lint.yml
name: Code Quality Assurance (Flake8)

# Define que o teste rodará em todo Push ou Pull Request na branch principal
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  linting-process:
    name: Python Lint Check
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório para a máquina virtual
      - name: Checkout Repository
        uses: actions/checkout@v4 # Atualizado para v4 (mais recente)

      # 2. Configura o ambiente Python
      - name: Setup Python Environment
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.10'
          cache: 'pip' # Otimiza o tempo de execução em commits futuros

      # 3. Instala apenas o necessário para o lint
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # 4. Execução do Lint com foco em erros críticos e lógica
      - name: Analyze Code Structure (Flake8)
        run: |
          # Para o build se houver erros de sintaxe Python ou símbolos indefinidos
          # E9: SyntaxError, F63: Erros de lógica, F7: Erros de imports, F82: Variáveis indefinidas
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Saída amigável: conta avisos (warnings), mas não para o processo
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics