name: Alarme de Revisão Diária

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: pip install pyyaml google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Rodar script de verificação
        env:
          GOOGLE_CALENDAR_CREDENTIAL: ${{ secrets.GOOGLE_CALENDAR_CREDENTIAL }}
        run: python .vscode/scripts/check-revisions.py