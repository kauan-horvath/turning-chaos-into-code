name: Lint Python
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      # Avalia scripts oficiais ignorando tamanho de linha (E501)
      - run: flake8 .vscode/scripts/ --count --extend-ignore=E501,F401 --show-source --statistics
