name: Lint Python
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      # Avalia apenas os scripts oficiais para não travar nos seus rascunhos
      - run: flake8 .vscode/scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics